<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Assignment 0 whoo whoo!</title>
    </head>
    <body onload="main()">
        <canvas id="canvas" width="400" height="400"> </canvas>
        <script src="./lib/cuon-matrix-cse160.js"></script>
        <script src="asgn0.js"></script>
        <div class="coordinates-input">
            <div class="coordinates-field">
                <label class="input-label">v1: x</label>
                <input id="v1x" class="text-input" type="text">
                <label class="input-label">y</label>
                <input id="v1y"class="text-input" type="text">
            </div>
            <div class="coordinates-field">
                <label class="input-label">v2: x</label>
                <input id="v2x" class="text-input" type="text">
                <label class="input-label">y</label>
                <input id="v2y"class="text-input" type="text">
            </div>
            <input onclick="handleDrawEvent()" type="button" value="Draw">
        </div>
        <div class="operation-input">
            <div class="operation-fields">
                <select id="operation-select">
                    <option value="add">Add</option>
                    <option value="subtract">Subtract</option>
                    <option value="multiply">Multiply</option>
                    <option value="divide">Divide</option>
                    <option value="dotProduct">Angle Between</option>
                    <option value="crossProduct">Area</option>
                    <option value="magnitude">Magnitude</option>
                    <option value="normalize">Normalize</option>
                </select>
                <input id="operand" required type="number">
            </div>
            <input onclick="handleDrawOperationEvent()" type="button" value="Draw">
        </div>
    </body>
</html>
