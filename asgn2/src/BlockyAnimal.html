<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw stuff</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <!-- Uncomment for performance testing -->
    <p id="numdot"></p>

    <div class="paint-controls">
        <div>
            <label>Yellow</label><input type="range" min="-45" max="45" value="0" class="slider" id="yellowSlide">
            <label>Animation:</label>
            <button type="button" id="animationYellowOnButton">ON</button>
            <button type="button" id="animationYellowOffButton">OFF</button>
        </div>
        <div>
            Magenta <input type="range" min="-45" max="45" value="0" class="slider" id="magentaSlide">
            <label>Animation:</label>
            <button type="button" id="animationMagentaOnButton">ON</button>
            <button type="button" id="animationMagentaOffButton">OFF</button>
        </div>
        <div>
            Camera Angle <input type="range" min="0", max="360" value="90" class="slider" id="angleSlide">
        </div>
    </div>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="./Point.js"></script>
    <script src="./Triangle.js"></script>
    <script src="./Circle.js"></script>
    <script src="./Cube.js"></script>
    <script src="./BlockyAnimal.js"></script>
  </body>
</html>
