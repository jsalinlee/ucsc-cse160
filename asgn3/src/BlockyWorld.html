<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Bat stuff</title>
    <link rel="stylesheet", href="../static/styles.css">
  </head>

  <body onload="main()">
    <div class="canvas-wrapper">
        <canvas id="webgl" width="1200" height="800">
            Please use a browser that supports "canvas"
        </canvas>
    </div>

    <!-- Uncomment for performance testing -->
    
    <div class="settings">
        <p id="numdot"></p>
        <div class="settings-item">
            Camera Angle <input type="range" min="0", max="360" value="0" class="slider" id="angleSlide">
        <div class="settings-item">
            FOV <input type="range" min="70", max="150" value="90" class="slider" id="fovSlide">
        </div>
        </div>
    </div>
    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="./Camera.js"></script>
    <script src="./Triangle.js"></script>
    <script src="./Cube.js"></script>
    <script src="./Pyramid.js"></script>
    <script src="./BlockyWorld.js"></script>
  </body>
</html>
